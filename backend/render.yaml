services:
  - type: web
    name: interviewiq-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        sync: false   # Set in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL
